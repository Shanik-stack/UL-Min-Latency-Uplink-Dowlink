test:
  K: 3
  Nb: 16
  Nr:
    - 4
    - 4
    - 4
  T:
    - 50
    - 60
    - 80
  B:
    - 200
    - 400
    - 600
  P:
    - 30
    - 30
    - 30
  snr_db:
    - 8
    - 8
    - 8
  fs:
    - 15000.0
    - 15000.0
    - 15000.0
  epsilon:
    - 1.0e-10
    - 1.0e-10
    - 1.0e-10
  initial_bits_per_symbol:
    - 4
    - 4
    - 4
simulation:
  # Per-user precoder updates inside one synchronized block sweep
  max_precoder_sweeps: 500
  print_every_sweep: 5
  user_update_steps: 1
  user_update_lr: 0.001

  # Constrained block solve
  initial_lambda_rate_constraint: 0.1
  initial_lambda_power_constraint: 0.01
  lr_rate_constraint: 0.01
  lr_power_constraint: 0.001
  constraint_loss_form: plain_lagrangian
  augmented_lagrangian_rho_rate: 1.0
  augmented_lagrangian_rho_power: 1.0
  main_solve_max_sweeps: 500
  reduced_n_kl_repair_max_sweeps: 50
  kkt_primal_tol: 1.0e-5
  kkt_complementarity_tol: 1.0e-5
  kkt_stationarity_tol: 3.0e-3
  kkt_patience: 3
  kkt_stall_patience: 25
  kkt_primal_improvement_tol: 1.0e-7

  # Reduced-n_kl repair behavior
  n_kl_reduction_update_scope: infeasible_users_only

  # Monte Carlo training data
  monte_carlo_training_blocks_per_seed: 3
  monte_carlo_training_fallback_target_bits: 1
  monte_carlo_training_n_kl_coarse_step: 5

  # Downlink block objective and payload weighting
  convergence_block_objective_mode: weighted_sum_rate
  remaining_bits_weight_power: 1.0
  minimum_user_weight: 0.25
  network_rate_weight: 0.15
  latency_penalty_weight: 0.5

  # Experiment limits
  max_total_blocks: 256

  # Scenario definition
  experiment_scenario:
    mode: payload_completion
    payload_bits_source: system_B
    skip_infeasible_blocks: true
    skip_block_adds_full_T_latency: true
    track_skipped_blocks: true

  # Allowed blocklength search range
  n_kl_range:
    min: 5
    step: 1
