simulation:
  initial_lambda_rate_constraint: 0.1
  initial_lambda_power_constraint: 0.01
  # epochs_per_n_kl: 10000
  epochs_per_n_kl: 100000
  # lr_net: 0.01
  lr_net: 0.01
  lr_rate_constraint: 0.01
  lr_power_constraint: 0.001
  # max_precoder_sweeps: 10000
  max_precoder_sweeps: 100000
  print_every_sweep: 1
  precoder_net_train_blocks_per_seed: 4
  precoder_net_train_min_bits_required: 1
  precoder_net_train_n_kl_coarse_step: 5
  # step_lr: 0.01
  step_lr: 0.01
  user_update_steps: 1
  user_update_lr: 0.01
  max_total_blocks: 256
  precoder_tol: 1.0e-4
  feasibility_tol: 1.0e-5
  convergence_max_precoder_sweeps: 10000
  convergence_min_precoder_sweeps_before_stop: 1000
  convergence_precoder_tol: 0.5e-4
  convergence_feasibility_tol: 1.0e-5
  uplink_rate_model: snr
  experiment_scenario:
    mode: payload_completion
    payload_bits_source: system_B
    skip_infeasible_blocks: true
    skip_block_adds_full_T_latency: true
    track_skipped_blocks: true
  n_kl_range:
    min: 1
    step: 1
