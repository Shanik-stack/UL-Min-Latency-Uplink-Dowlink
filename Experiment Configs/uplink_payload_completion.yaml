test:
  K: 3
  Nr:
    - 16
    - 16
    - 16
  Nt:
    - 4
    - 4
    - 4
  T:
    - 100
    - 100
    - 100
  B:
    - 2400
    - 2400
    - 2400
  P:
    - 20
    - 20
    - 20
  snr_db:
    - 15
    - 10
    - 8
  fs:
    - 15000.0
    - 15000.0
    - 15000.0
  epsilon:
    - 1.0e-10
    - 1.0e-10
    - 1.0e-10

simulation:
  # Constrained precoder solve
  initial_lambda_rate_constraint: 0.1
  initial_lambda_power_constraint: 0.01
  max_epochs: 1000
  lr_net: 0.01
  lr_rate_constraint: 0.01
  lr_power_constraint: 0.001
  constraint_loss_form: plain_lagrangian
  augmented_lagrangian_rho_rate: 1.0
  augmented_lagrangian_rho_power: 1.0
  print_every_epoch: 1

  # KKT-based stopping
  kkt_primal_tol: 1.0e-5
  kkt_complementarity_tol: 1.0e-5
  kkt_stationarity_tol: 5.0e-5
  reduced_n_kl_log_interval: 10

  # Monte Carlo training data
  monte_carlo_training_blocks_per_seed: 4
  monte_carlo_training_fallback_target_bits: 1
  monte_carlo_training_n_kl_coarse_step: 5

  # Experiment limits and rate model
  max_total_blocks: 256
  uplink_rate_model: snr

  # Scenario definition
  experiment_scenario:
    mode: payload_completion
    payload_bits_source: system_B
    skip_infeasible_blocks: true
    skip_block_adds_full_T_latency: true
    track_skipped_blocks: true

  # Allowed blocklength search range
  n_kl_range:
    min: 1
    step: 1
